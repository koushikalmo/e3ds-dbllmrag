<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eagle 3DS Query</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #ffffff;
      --bg2:     #f6f7f9;
      --bg3:     #eef0f3;
      --border:  #dde1e7;
      --border2: #c8cdd6;
      --text:    #111827;
      --dim:     #6b7280;
      --dimmer:  #9ca3af;
      --accent:  #d95f00;
      --accent2: #f97316;
      --green:   #16a34a;
      --red:     #dc2626;
      --blue:    #2563eb;
      --yellow:  #b45309;
      --purple:  #7c3aed;
      --mono:    'JetBrains Mono', 'Courier New', monospace;
      --display: 'Syne', sans-serif;
      --sidebar: 260px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a0a8b4; }

    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin   { to{transform:rotate(360deg)} }
    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── App shell ───────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem 0 1rem; border-bottom: 1px solid var(--border);
      background: var(--bg); gap: 1rem; height: 52px; flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .logo { display: flex; align-items: center; gap: .75rem; }
    .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 7px rgba(217,95,0,.35); }
    .logo-text { font-family: var(--display); font-size: 1rem; font-weight: 800; letter-spacing: -.02em; }
    .logo-text span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 1.25rem; }
    .llm-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; padding: 3px 8px; border-radius: 4px;
      border: 1px solid var(--border2); letter-spacing: .08em;
    }
    .llm-badge.local  { color: #15803d; border-color: #86efac; background: #f0fdf4; }
    .llm-badge.cloud  { color: #1d4ed8; border-color: #93c5fd; background: #eff6ff; }
    .llm-badge.error  { color: var(--red); border-color: #fca5a5; background: #fef2f2; }
    .llm-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
    .status { display: flex; align-items: center; gap: 5px; color: var(--dim); font-size: 10px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }

    /* ── Workspace ───────────────────────────────────────────── */
    .workspace { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar); flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-top {
      padding: .75rem .75rem .5rem; flex-shrink: 0;
    }
    .new-chat-btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      padding: .6rem .875rem; border-radius: 6px; font-family: var(--mono);
      font-size: 11px; font-weight: 700; letter-spacing: .06em; cursor: pointer;
      transition: background .15s; display: flex; align-items: center; gap: 6px;
    }
    .new-chat-btn:hover { background: #bf5200; }
    .sidebar-sessions { flex: 1; overflow-y: auto; padding: .25rem .5rem .75rem; }
    .sidebar-date-group { margin-bottom: .5rem; }
    .sidebar-date-label {
      font-size: 9px; letter-spacing: .12em; color: var(--dimmer);
      padding: .5rem .5rem .25rem; display: block;
    }
    .session-item {
      display: block; width: 100%; background: none; border: none;
      text-align: left; padding: .55rem .65rem; border-radius: 5px;
      cursor: pointer; font-family: var(--mono); transition: background .12s;
      position: relative; margin-bottom: 1px;
    }
    .session-item:hover { background: rgba(0,0,0,.06); }
    .session-item.active { background: var(--bg3); border-left: 2px solid var(--accent); }
    .session-item:hover .session-del { opacity: 1; }
    .session-title {
      display: block; font-size: 11px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      padding-right: 20px;
    }
    .session-meta {
      display: block; font-size: 9px; color: var(--dimmer); margin-top: 2px;
    }
    .session-del {
      position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--dimmer); font-size: 14px;
      cursor: pointer; opacity: 0; transition: opacity .12s, color .12s;
      padding: 2px 5px; border-radius: 3px; line-height: 1;
    }
    .session-del:hover { color: var(--red); background: #fef2f2; }
    .sidebar-empty {
      text-align: center; padding: 2rem .75rem;
      color: var(--dimmer); font-size: 11px; line-height: 1.9;
    }

    /* ── Chat area ───────────────────────────────────────────── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    /* ── Messages scroll container ───────────────────────────── */
    .messages-wrap { flex: 1; overflow-y: auto; }
    .messages {
      max-width: 860px; margin: 0 auto; padding: 1.75rem 1.5rem 1rem;
      display: flex; flex-direction: column; gap: 1.75rem;
    }

    /* ── Welcome state ───────────────────────────────────────── */
    .welcome-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; padding: 3rem 2rem; text-align: center;
    }
    .welcome-glyph { font-family: var(--display); font-size: 3.5rem; color: var(--border); letter-spacing: -.05em; user-select: none; }
    .welcome-sub   { color: var(--dimmer); font-size: 12px; margin: .75rem 0 1.5rem; line-height: 1.7; }
    .example-chips { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; max-width: 600px; }
    .example-chip {
      background: var(--bg2); border: 1px solid var(--border2); color: var(--dim);
      padding: .45rem .875rem; border-radius: 20px; font-family: var(--mono);
      font-size: 11px; cursor: pointer; transition: all .15s;
    }
    .example-chip:hover { background: var(--bg3); border-color: var(--accent); color: var(--accent); }

    /* ── Individual message ──────────────────────────────────── */
    .msg { animation: fadeUp .2s ease; }

    /* User bubble */
    .msg-user {
      display: flex; justify-content: flex-end; gap: .75rem; align-items: flex-end;
    }
    .msg-user-bubble {
      background: var(--accent); color: #fff; border-radius: 16px 16px 4px 16px;
      padding: .75rem 1.1rem; font-size: 13px; line-height: 1.6;
      max-width: 75%; word-break: break-word;
      box-shadow: 0 1px 3px rgba(217,95,0,.25);
    }
    .msg-user-avatar {
      width: 30px; height: 30px; border-radius: 50%; background: var(--bg3);
      border: 1px solid var(--border2); display: flex; align-items: center;
      justify-content: center; font-size: 11px; color: var(--dim); flex-shrink: 0;
    }

    /* Assistant response */
    .msg-assistant { display: flex; gap: .75rem; align-items: flex-start; }
    .msg-assistant-avatar {
      width: 30px; height: 30px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #fff; font-weight: 700; flex-shrink: 0; margin-top: 2px;
      box-shadow: 0 1px 4px rgba(217,95,0,.3);
    }
    .msg-assistant-body { flex: 1; min-width: 0; }

    /* Loading dots */
    .msg-loading-dots {
      display: flex; gap: 5px; padding: .6rem 0; align-items: center;
    }
    .msg-loading-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    }
    .msg-loading-text { color: var(--dim); font-size: 11px; margin-left: .5rem; }

    /* Error inline */
    .msg-error-card {
      background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px;
      padding: .875rem 1.1rem; color: #991b1b; font-size: 12px; line-height: 1.6;
    }
    .msg-error-label { font-weight: 700; color: var(--red); }

    /* ── AI summary (main response text) ────────────────────── */
    .ai-summary {
      font-size: 13.5px; line-height: 1.8; color: var(--text);
      padding: .25rem 0 .75rem;
    }
    .ai-summary p  { margin-bottom: .75rem; }
    .ai-summary p:last-child { margin-bottom: 0; }
    .ai-summary strong { font-weight: 700; color: var(--text); }
    .ai-summary em     { font-style: italic; }
    .ai-summary ul, .ai-summary ol { padding-left: 1.5rem; margin: .5rem 0; }
    .ai-summary li { margin-bottom: .35rem; }
    .ai-summary code {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 3px;
      padding: 1px 5px; font-size: 12px; font-family: var(--mono);
    }
    .ai-summary h3 { font-size: 13px; font-weight: 700; margin: .75rem 0 .35rem; color: var(--accent); }

    /* ── Collapsible raw data section ────────────────────────── */
    .raw-data-toggle {
      display: flex; align-items: center; gap: .5rem; cursor: pointer;
      color: var(--dim); font-size: 11px; padding: .5rem 0; border: none;
      background: none; font-family: var(--mono); letter-spacing: .04em;
      transition: color .15s; user-select: none; width: 100%; text-align: left;
    }
    .raw-data-toggle:hover { color: var(--text); }
    .raw-data-toggle .toggle-arrow { transition: transform .2s; display: inline-block; }
    .raw-data-toggle.open .toggle-arrow { transform: rotate(90deg); }
    .raw-data-section { display: none; margin-top: .25rem; }
    .raw-data-section.open { display: block; }

    /* Result card (wraps raw data) */
    .result-card {
      border: 1px solid var(--border); border-radius: 8px;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .result-card-header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: .55rem 1rem; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: .5rem;
    }
    .result-card-header-left { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .result-label { color: var(--accent); font-weight: 700; font-size: 11px; }
    .result-meta  { color: var(--dimmer); font-size: 11px; }
    .result-card-header-right { display: flex; align-items: center; gap: .5rem; }
    .view-tabs { display: flex; gap: 3px; }
    .tab-btn {
      background: none; border: 1px solid var(--border); color: var(--dimmer);
      padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-size: 10px;
      cursor: pointer; letter-spacing: .04em; text-transform: uppercase; transition: all .15s;
    }
    .tab-btn.active { background: var(--bg); color: var(--text); border-color: var(--border2); box-shadow: 0 1px 2px rgba(0,0,0,.08); }
    .tab-btn:hover:not(.active) { color: var(--dim); background: var(--bg3); }
    .copy-bar {
      display: flex; justify-content: flex-end; padding: .4rem .875rem;
      border-bottom: 1px solid var(--border); background: var(--bg2);
    }
    .btn-copy {
      background: var(--bg); border: 1px solid var(--border2); color: var(--dim);
      padding: 3px 10px; border-radius: 4px; font-family: var(--mono); font-size: 11px;
      cursor: pointer; transition: all .15s;
    }
    .btn-copy:hover { border-color: var(--dim); color: var(--text); background: var(--bg3); }
    .result-body { overflow: auto; max-height: 380px; background: var(--bg); }
    .pagination-bar {
      background: var(--bg2); border-top: 1px solid var(--border);
      padding: .4rem .875rem; display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: var(--dimmer);
    }
    .page-btn {
      background: var(--bg); border: 1px solid var(--border); color: var(--dim);
      padding: 2px 10px; border-radius: 4px; font-family: var(--mono);
      font-size: 10px; cursor: pointer; transition: all .15s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--border2); color: var(--text); background: var(--bg3); }
    .page-btn:disabled { opacity: .3; cursor: default; }

    /* ── Table ───────────────────────────────────────────────── */
    .results-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .results-table th {
      padding: 7px 11px; text-align: left; border-bottom: 2px solid var(--border);
      color: var(--accent); font-weight: 600; white-space: nowrap;
      background: var(--bg2); position: sticky; top: 0; z-index: 1;
    }
    .results-table td {
      padding: 6px 11px; color: var(--text); border-bottom: 1px solid var(--border);
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .results-table tr:nth-child(even) td { background: #fafbfc; }
    .results-table tr:hover td { background: #f0f4ff; }
    .val-bool-true  { color: var(--green); font-weight: 600; }
    .val-bool-false { color: var(--red); }
    .val-number     { color: var(--blue); font-variant-numeric: tabular-nums; }
    .val-null       { color: var(--dimmer); font-style: italic; }
    .code-view {
      background: #1e1e2e; color: #cdd6f4; padding: 1.25rem; font-size: 11px;
      font-family: var(--mono); overflow: auto; white-space: pre; min-height: 100px;
    }
    .pipeline-view { color: #89b4fa; }

    /* ── Input dock (fixed at bottom) ────────────────────────── */
    .input-dock {
      flex-shrink: 0; padding: .875rem 1.5rem 1.25rem;
      background: var(--bg); border-top: 1px solid var(--border);
    }
    .input-outer {
      max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: .4rem;
    }
    .input-wrap {
      border: 1px solid var(--border2); border-radius: 12px; overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      display: flex; align-items: flex-end; background: var(--bg);
    }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,95,0,.12); }
    .input-wrap.listening    { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,95,0,.18); }
    textarea {
      flex: 1; background: transparent; color: var(--text); border: none; outline: none;
      padding: .875rem 1rem; font-size: 13px; font-family: var(--mono); resize: none;
      line-height: 1.6; max-height: 180px; overflow-y: auto; min-height: 48px;
    }
    textarea::placeholder { color: var(--dimmer); }
    textarea:disabled { opacity: .5; }
    .input-actions {
      display: flex; align-items: flex-end; gap: 4px; padding: .5rem .6rem;
      flex-shrink: 0;
    }
    .btn-icon {
      width: 34px; height: 34px; border-radius: 8px; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; flex-shrink: 0;
    }
    .btn-voice {
      background: var(--bg2); color: var(--dim); border: 1px solid var(--border2);
    }
    .btn-voice:hover { background: var(--bg3); color: var(--text); }
    .btn-voice.active { background: #fff7ed; border-color: var(--accent); color: var(--accent); }
    .btn-voice:disabled { opacity: .4; cursor: default; }
    .btn-send {
      background: var(--accent); color: #fff;
    }
    .btn-send:hover:not(:disabled) { background: #bf5200; }
    .btn-send:disabled { background: var(--border2); color: var(--dim); cursor: default; }
    .btn-stop-inline {
      background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b;
      width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .btn-stop-inline:hover { background: #991b1b; color: #fff; }
    .input-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 .25rem; max-width: 860px;
    }
    .input-footer-hint { color: var(--dimmer); font-size: 10px; }
    .listening-hint { color: var(--accent); font-size: 11px; animation: pulse 1s infinite; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-text">EAGLE 3DS <span>QUERY</span></div>
    </div>
    <div class="header-right">
      <div class="llm-badge" id="llmBadge" title="Active LLM provider">
        <span class="llm-badge-dot"></span>
        <span id="llmBadgeText">LLM</span>
      </div>
      <div class="status"><div class="status-dot"></div>LIVE</div>
    </div>
  </header>

  <!-- ── WORKSPACE ──────────────────────────────────────────── -->
  <div class="workspace">

    <!-- ── SIDEBAR ────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          NEW CHAT
        </button>
      </div>
      <div class="sidebar-sessions" id="sidebarSessions">
        <div class="sidebar-empty" id="sidebarEmpty">
          No conversations yet.<br>Ask a question to start.
        </div>
      </div>
    </aside>

    <!-- ── CHAT AREA ────────────────────────────────────────────── -->
    <div class="chat-area">

      <!-- Messages scroll area -->
      <div class="messages-wrap" id="messagesWrap">

        <!-- Welcome state (shown when no messages) -->
        <div class="welcome-state" id="welcomeState">
          <div class="welcome-glyph">E3DS</div>
          <div class="welcome-sub">
            Ask anything about your streaming data.<br>
            Month/year is detected automatically from your question.
          </div>
          <div class="example-chips">
            <button class="example-chip">Top 5 countries by session in April 2026</button>
            <button class="example-chip">Show VPN users from October 2025</button>
            <button class="example-chip">Average RTT by browser this month</button>
            <button class="example-chip">Which apps had the most sessions last month?</button>
          </div>
        </div>

        <!-- Message turns render here -->
        <div class="messages" id="messages" style="display:none;"></div>

      </div>

      <!-- Input dock -->
      <div class="input-dock">
        <div class="input-outer">
          <div class="input-wrap" id="inputWrap">
            <textarea id="questionInput" rows="1"
              placeholder="Ask anything about your streaming data…"></textarea>
            <div class="input-actions">
              <button class="btn-icon btn-voice" id="voiceBtn" title="Voice input">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              </button>
              <button class="btn-icon btn-stop-inline" id="stopBtn" style="display:none;" title="Stop">
                ■
              </button>
              <button class="btn-icon btn-send" id="runBtn" title="Send (Enter)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
              </button>
            </div>
          </div>
          <div class="input-footer">
            <span class="listening-hint" id="listeningHint" style="display:none;">● Listening…</span>
            <span></span>
            <span class="input-footer-hint">Enter to send · Shift+Enter for newline</span>
          </div>
        </div>
      </div>
    </div><!-- end .chat-area -->

  </div><!-- end .workspace -->
</div><!-- end #app -->

<script>
// ============================================================
// Eagle 3DS Query UI — v4  (ChatGPT-style conversation)
// ============================================================
// Layout: sidebar (past chats) + scrolling message thread + fixed input
// History: stored in localStorage — clicking a session loads it,
//          does NOT re-run queries.
// Per-message: each result card has its own tab/page state.
// ============================================================

const PAGE_SIZE = 25;

// ── Session & conversation state ──────────────────────────────
// A "session" = one continuous conversation (a series of turns).
// A "turn"    = one user question + one assistant response.
//
// Conversation data lives in localStorage under key "e3ds_chats".
// Each entry: { id, title, createdAt, turns: [{role, content|data|error, ts}] }

const STORE_KEY  = "e3ds_chats";
const MAX_CHATS  = 40;      // max sessions to keep in localStorage
const MAX_ROWS   = 50;      // max result rows stored per turn (localStorage size)

let SESSION_ID    = crypto.randomUUID();   // current conversation ID
let currentTurns  = [];                    // turns for the active session
let activeAbort   = null;
let _timedOut     = false;
let isListening   = false;
let recognition   = null;

// Per-message render state: WeakMap<element, {rows, page, view, data}>
const msgState = new WeakMap();


// ── DOM refs ──────────────────────────────────────────────────
const questionInput  = document.getElementById("questionInput");
const runBtn         = document.getElementById("runBtn");
const stopBtn        = document.getElementById("stopBtn");
const voiceBtn       = document.getElementById("voiceBtn");
const listeningHint  = document.getElementById("listeningHint");
const inputWrap      = document.getElementById("inputWrap");
const messagesWrap   = document.getElementById("messagesWrap");
const messagesEl     = document.getElementById("messages");
const welcomeState   = document.getElementById("welcomeState");
const sidebarSessions = document.getElementById("sidebarSessions");
const sidebarEmpty   = document.getElementById("sidebarEmpty");
const newChatBtn     = document.getElementById("newChatBtn");

// ── localStorage helpers ──────────────────────────────────────
function getChats() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || "[]"); }
  catch { return []; }
}
function saveChats(chats) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(chats.slice(0, MAX_CHATS))); }
  catch { /* storage full */ }
}
function getChat(id) {
  return getChats().find(c => c.id === id) || null;
}
function upsertChat(chat) {
  const chats   = getChats().filter(c => c.id !== chat.id);
  chats.unshift(chat);   // newest first
  saveChats(chats);
}
function deleteChat(id) {
  saveChats(getChats().filter(c => c.id !== id));
}


// ── LLM status badge ──────────────────────────────────────────
async function refreshLLMStatus() {
  try {
    const r    = await fetch("/api/status");
    const data = await r.json();
    if (data.provider === "ollama") {
      if (data.available) {
        llmBadge.className    = "llm-badge local";
        llmBadgeText.textContent = `LOCAL · ${data.model.split(":")[0]}`;
        llmBadge.title        = `Ollama: ${data.model} (running)`;
      } else {
        llmBadge.className    = "llm-badge error";
        llmBadgeText.textContent = "LOCAL OFFLINE";
      }
    } else {
      llmBadge.className    = "llm-badge cloud";
      llmBadgeText.textContent = `CLOUD · ${data.model.replace("gemini-","").replace("-flash","⚡")}`;
    }
  } catch {
    llmBadge.className    = "llm-badge error";
    llmBadgeText.textContent = "LLM ERROR";
  }
}
refreshLLMStatus();
setInterval(refreshLLMStatus, 30_000);

// ── Start a new chat session ──────────────────────────────────
function startNewChat() {
  SESSION_ID   = crypto.randomUUID();
  currentTurns = [];
  messagesEl.innerHTML = "";
  messagesEl.style.display  = "none";
  welcomeState.style.display = "flex";
  // Deselect sidebar item
  document.querySelectorAll(".session-item").forEach(el => el.classList.remove("active"));
  questionInput.value = "";
  questionInput.style.height = "auto";
  questionInput.focus();
}


// ── Submit a query ────────────────────────────────────────────
async function submitQuery() {
  const q = questionInput.value.trim();
  if (!q || runBtn.disabled) return;

  // Show messages area if first message in this session
  if (currentTurns.length === 0) {
    welcomeState.style.display = "none";
    messagesEl.style.display   = "flex";
  }

  // Append user bubble
  appendUserMessage(q);

  // Append assistant loading placeholder
  const loadingEl = appendLoadingMessage();

  // Clear input
  questionInput.value = "";
  questionInput.style.height = "auto";

  setLoading(true);

  _timedOut   = false;
  activeAbort = new AbortController();

  // Progressive loading text
  let loadingTimer1 = setTimeout(() => updateLoadingText(loadingEl, "Running query… analyzing results with AI"), 4_000);
  let loadingTimer2 = setTimeout(() => updateLoadingText(loadingEl, "Still working… model may be loading into GPU"), 20_000);
  const safetyTimer = setTimeout(() => { _timedOut = true; if (activeAbort) activeAbort.abort(); }, 270_000);

  try {
    const res  = await fetch("/api/query", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ question: q, collection: "Apr_2026", session_id: SESSION_ID }),
      signal:  activeAbort.signal,
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || "Query failed");

    // Replace loading with result card
    replaceLoadingWithResult(loadingEl, data.data);

    // Persist turn
    const turn = {
      role:      "turn",
      question:  q,
      data:      trimDataForStorage(data.data),
      ts:        new Date().toISOString(),
    };
    currentTurns.push(turn);
    persistCurrentSession(q);

  } catch (err) {
    let msg;
    if (err.name === "AbortError") {
      msg = _timedOut
        ? "Query timed out after 4.5 min. Check that Ollama is running and using your GPU (run: ollama ps)."
        : null;  // user clicked STOP — remove loading bubble silently
    } else {
      msg = err.message;
    }

    if (msg) {
      replaceLoadingWithError(loadingEl, msg);
      const turn = { role: "turn", question: q, error: msg, ts: new Date().toISOString() };
      currentTurns.push(turn);
      persistCurrentSession(q);
    } else {
      loadingEl.remove();  // STOP clicked — quietly remove
    }

  } finally {
    clearTimeout(loadingTimer1);
    clearTimeout(loadingTimer2);
    clearTimeout(safetyTimer);
    activeAbort = null;
    setLoading(false);
    scrollToBottom();
  }
}


// ── Persist current session to localStorage ───────────────────
function persistCurrentSession(firstQuestion) {
  const chat = getChat(SESSION_ID) || {
    id:        SESSION_ID,
    title:     firstQuestion.slice(0, 60),
    createdAt: new Date().toISOString(),
    turns:     [],
  };
  chat.turns = currentTurns;
  upsertChat(chat);
  renderSidebar();
}


// ── Trim result data for localStorage ────────────────────────
function trimDataForStorage(data) {
  if (!data) return data;
  const trimmed = { ...data };
  if (Array.isArray(trimmed.results)) {
    trimmed.results = trimmed.results.slice(0, MAX_ROWS);
  } else if (trimmed.results && typeof trimmed.results === "object") {
    const r = trimmed.results;
    if (Array.isArray(r.primary)) trimmed.results = { ...r, primary: r.primary.slice(0, MAX_ROWS) };
    if (Array.isArray(r.merged))  trimmed.results = { ...r, merged:  r.merged.slice(0, MAX_ROWS) };
  }
  return trimmed;
}

// ── Simple markdown → HTML renderer ──────────────────────────
// Handles the subset Ollama/Gemini commonly outputs: bold, italic,
// inline code, bullet lists, numbered lists, headings, paragraphs.
function renderMd(text) {
  if (!text) return "";
  const lines  = text.split("\n");
  const out    = [];
  let inUl = false, inOl = false;

  const closeLists = () => {
    if (inUl) { out.push("</ul>"); inUl = false; }
    if (inOl) { out.push("</ol>"); inOl = false; }
  };

  const inlineFormat = s => s
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,     "<em>$1</em>")
    .replace(/`(.+?)`/g,       "<code>$1</code>");

  for (let i = 0; i < lines.length; i++) {
    const raw  = lines[i];
    const line = raw.trim();

    if (!line) { closeLists(); out.push(""); continue; }

    // Headings
    if (/^#{1,3}\s/.test(line)) {
      closeLists();
      out.push(`<h3>${inlineFormat(line.replace(/^#+\s/, ""))}</h3>`);
      continue;
    }

    // Unordered list: "- " or "* "
    const ulMatch = line.match(/^[-*•]\s+(.*)/);
    if (ulMatch) {
      if (inOl) { out.push("</ol>"); inOl = false; }
      if (!inUl) { out.push("<ul>"); inUl = true; }
      out.push(`<li>${inlineFormat(ulMatch[1])}</li>`);
      continue;
    }

    // Ordered list: "1. " "2. " etc
    const olMatch = line.match(/^\d+\.\s+(.*)/);
    if (olMatch) {
      if (inUl) { out.push("</ul>"); inUl = false; }
      if (!inOl) { out.push("<ol>"); inOl = true; }
      out.push(`<li>${inlineFormat(olMatch[1])}</li>`);
      continue;
    }

    closeLists();
    out.push(`<p>${inlineFormat(line)}</p>`);
  }
  closeLists();
  return out.join("");
}


// ── Build a result message (AI summary + collapsible raw data) ─
function buildResultCard(data) {
  const wrapper = document.createElement("div");

  const rows  = data.queryType === "dual"
    ? (data.results?.merged || data.results?.primary || [])
    : (data.results || []);
  const count   = data.queryType === "dual" ? (data.summary?.primary?.count ?? 0) : (data.summary?.count ?? 0);
  const elapsed = data.meta?.elapsedSeconds;

  // ── 1. AI summary ──────────────────────────────────────────
  if (data.aiSummary) {
    const summaryEl = document.createElement("div");
    summaryEl.className = "ai-summary";
    summaryEl.innerHTML = renderMd(data.aiSummary);
    wrapper.appendChild(summaryEl);
  } else if (count === 0) {
    const empty = document.createElement("div");
    empty.className = "ai-summary";
    empty.textContent = "No records matched your query.";
    wrapper.appendChild(empty);
  }

  // ── 2. Collapsible raw data ────────────────────────────────
  const toggle = document.createElement("button");
  toggle.className = "raw-data-toggle";
  toggle.innerHTML = `<span class="toggle-arrow">▶</span> Raw Data (${count} result${count !== 1 ? "s" : ""})`;
  wrapper.appendChild(toggle);

  const rawSection = document.createElement("div");
  rawSection.className = "raw-data-section";
  wrapper.appendChild(rawSection);

  // Build the inner card (table/json/pipeline)
  const card = document.createElement("div");
  card.className = "result-card";
  rawSection.appendChild(card);

  const state = { rows, page: 1, view: "table", data };
  msgState.set(card, state);

  // Card header with tabs
  const header = document.createElement("div");
  header.className = "result-card-header";
  header.innerHTML = `
    <div class="result-card-header-left">
      <span class="result-label">${escHtml(data.resultLabel || "Results")}</span>
      <span class="result-meta">${count} record${count !== 1 ? "s" : ""}${elapsed != null ? " · " + elapsed + "s" : ""}</span>
    </div>
    <div class="result-card-header-right">
      <div class="view-tabs">
        <button class="tab-btn active" data-view="table">TABLE</button>
        <button class="tab-btn"        data-view="json">JSON</button>
        <button class="tab-btn"        data-view="pipeline">PIPELINE</button>
      </div>
    </div>
  `;
  card.appendChild(header);

  const copyBar = document.createElement("div");
  copyBar.className = "copy-bar";
  copyBar.style.display = "none";
  copyBar.innerHTML = `<button class="btn-copy">COPY PIPELINE</button>`;
  card.appendChild(copyBar);

  const resultBody = document.createElement("div");
  resultBody.className = "result-body";
  card.appendChild(resultBody);

  const pageBar = document.createElement("div");
  pageBar.className = "pagination-bar";
  pageBar.style.display = "none";
  pageBar.innerHTML = `
    <button class="page-btn prev-btn">← PREV</button>
    <span class="page-info"></span>
    <button class="page-btn next-btn">NEXT →</button>
  `;
  card.appendChild(pageBar);

  // Toggle open/close
  toggle.addEventListener("click", () => {
    const isOpen = rawSection.classList.toggle("open");
    toggle.classList.toggle("open", isOpen);
    if (isOpen) renderCardBody(card);
  });

  // Tab switching
  header.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      header.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.view = btn.dataset.view;
      renderCardBody(card);
    });
  });

  // Pagination
  pageBar.querySelector(".prev-btn").addEventListener("click", () => {
    if (state.page > 1) { state.page--; renderCardBody(card); }
  });
  pageBar.querySelector(".next-btn").addEventListener("click", () => {
    const total = Math.ceil(state.rows.length / PAGE_SIZE);
    if (state.page < total) { state.page++; renderCardBody(card); }
  });

  // Copy pipeline
  copyBar.querySelector(".btn-copy").addEventListener("click", () => {
    const btn  = copyBar.querySelector(".btn-copy");
    const pipe = data.executedPipeline || [];
    navigator.clipboard.writeText(JSON.stringify(pipe, null, 2))
      .then(() => { btn.textContent = "COPIED ✓"; setTimeout(() => btn.textContent = "COPY PIPELINE", 2000); })
      .catch(() => { btn.textContent = "FAILED";  setTimeout(() => btn.textContent = "COPY PIPELINE", 2000); });
  });

  return wrapper;
}


// ── Render the body of a result card ─────────────────────────
function renderCardBody(card) {
  const state   = msgState.get(card);
  const copyBar = card.querySelector(".copy-bar");
  const pageBar = card.querySelector(".pagination-bar");
  const body    = card.querySelector(".result-body");
  const data    = state.data;

  copyBar.style.display = state.view === "pipeline" ? "flex" : "none";
  body.innerHTML = "";

  if (state.view === "table") {
    renderTableInBody(body, pageBar, state);
  } else if (state.view === "json") {
    pageBar.style.display = "none";
    const pre = document.createElement("pre");
    pre.className = "code-view";
    pre.textContent = JSON.stringify(state.rows, null, 2);
    body.appendChild(pre);
  } else if (state.view === "pipeline") {
    pageBar.style.display = "none";
    const pipe = data.executedPipeline || [];
    const pre  = document.createElement("pre");
    pre.className = "code-view pipeline-view";
    pre.textContent = JSON.stringify(pipe, null, 2);
    body.appendChild(pre);
  }
}


function renderTableInBody(body, pageBar, state) {
  if (!state.rows || state.rows.length === 0) {
    const d = document.createElement("div");
    d.style.cssText = "padding:2rem; color:var(--dimmer); text-align:center; font-size:12px;";
    d.textContent = "NO RECORDS RETURNED";
    body.appendChild(d);
    pageBar.style.display = "none";
    return;
  }
  const total = Math.ceil(state.rows.length / PAGE_SIZE);
  const start = (state.page - 1) * PAGE_SIZE;
  const end   = Math.min(start + PAGE_SIZE, state.rows.length);
  if (total > 1) {
    pageBar.style.display = "flex";
    pageBar.querySelector(".page-info").textContent =
      `Page ${state.page} of ${total}  (${start+1}–${end} of ${state.rows.length})`;
    pageBar.querySelector(".prev-btn").disabled = state.page === 1;
    pageBar.querySelector(".next-btn").disabled = state.page === total;
  } else {
    pageBar.style.display = "none";
  }
  body.appendChild(buildTable(state.rows.slice(start, end)));
}


// ── Sidebar rendering ─────────────────────────────────────────
function renderSidebar() {
  const chats = getChats();
  sidebarSessions.innerHTML = "";

  if (chats.length === 0) {
    sidebarSessions.appendChild(buildSidebarEmpty());
    return;
  }

  // Group by date label
  const groups = {};
  chats.forEach(chat => {
    const label = dateGroupLabel(chat.createdAt);
    if (!groups[label]) groups[label] = [];
    groups[label].push(chat);
  });

  Object.entries(groups).forEach(([label, items]) => {
    const g = document.createElement("div");
    g.className = "sidebar-date-group";
    const lbl = document.createElement("span");
    lbl.className = "sidebar-date-label";
    lbl.textContent = label;
    g.appendChild(lbl);
    items.forEach(chat => g.appendChild(buildSessionItem(chat)));
    sidebarSessions.appendChild(g);
  });
}

function buildSidebarEmpty() {
  const d = document.createElement("div");
  d.className = "sidebar-empty";
  d.textContent = "No conversations yet.\nAsk a question to start.";
  return d;
}

function buildSessionItem(chat) {
  const item = document.createElement("button");
  item.className = "session-item" + (chat.id === SESSION_ID ? " active" : "");
  item.dataset.id = chat.id;

  const turnCount = (chat.turns || []).length;
  const ts        = fmtTime(chat.createdAt);

  item.innerHTML = `
    <span class="session-title">${escHtml(chat.title || "Untitled")}</span>
    <span class="session-meta">${ts} · ${turnCount} turn${turnCount !== 1 ? "s" : ""}</span>
    <button class="session-del" title="Delete this conversation">×</button>
  `;

  // Click → load conversation (no re-run)
  item.addEventListener("click", e => {
    if (e.target.classList.contains("session-del")) return;
    loadSession(chat.id);
  });

  // Delete
  item.querySelector(".session-del").addEventListener("click", e => {
    e.stopPropagation();
    deleteChat(chat.id);
    // If deleting the active session, start fresh
    if (chat.id === SESSION_ID) startNewChat();
    renderSidebar();
  });

  return item;
}

function dateGroupLabel(iso) {
  if (!iso) return "Earlier";
  const d     = new Date(iso);
  const now   = new Date();
  const diffMs = now - d;
  const diffDays = diffMs / (1000 * 60 * 60 * 24);
  if (diffDays < 1)  return "Today";
  if (diffDays < 2)  return "Yesterday";
  if (diffDays < 7)  return "This week";
  if (diffDays < 30) return "This month";
  return d.toLocaleDateString([], { month: "long", year: "numeric" });
}


// ── Load a stored session into the chat area ──────────────────
function loadSession(chatId) {
  const chat = getChat(chatId);
  if (!chat) return;

  SESSION_ID   = chat.id;
  currentTurns = chat.turns || [];

  messagesEl.innerHTML  = "";
  welcomeState.style.display = "none";
  messagesEl.style.display   = "flex";

  // Render all stored turns
  currentTurns.forEach(turn => {
    appendUserMessage(turn.question);
    if (turn.error) {
      const wrap = document.createElement("div");
      wrap.className = "msg msg-assistant";
      wrap.innerHTML = `
        <div class="msg-assistant-avatar">AI</div>
        <div class="msg-assistant-body">
          <div class="msg-error-card"><span class="msg-error-label">ERROR: </span>${escHtml(turn.error)}</div>
        </div>
      `;
      messagesEl.appendChild(wrap);
    } else if (turn.data) {
      const wrap = document.createElement("div");
      wrap.className = "msg msg-assistant";
      const body = document.createElement("div");
      body.className = "msg-assistant-body";
      body.appendChild(buildResultCard(turn.data));
      wrap.innerHTML = "";
      const avatar = document.createElement("div");
      avatar.className = "msg-assistant-avatar";
      avatar.textContent = "AI";
      wrap.appendChild(avatar);
      wrap.appendChild(body);
      messagesEl.appendChild(wrap);
    }
  });

  // Mark as active in sidebar
  document.querySelectorAll(".session-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id === chatId);
  });

  scrollToBottom();
  questionInput.focus();
}

// ── Table builder ─────────────────────────────────────────────
const PRIORITY = [
  "_id","appInfo.owner","appInfo.appName","clientInfo.city",
  "clientInfo.country_name","loadTime","webRtcStatsData.avgBitrate",
  "webRtcStatsData.packetsLost","webRtcStatsData.avgRoundTripTime",
  "userDeviceInfo.os.name","userDeviceInfo.device.type",
  "count","total","average","avg",
];

function buildTable(docs) {
  const flat    = docs.map(flattenDoc);
  const allKeys = [...new Set(flat.flatMap(d => Object.keys(d)))];
  const cols = [
    ...PRIORITY.filter(k => allKeys.includes(k)),
    ...allKeys.filter(k => !PRIORITY.includes(k)),
  ].slice(0, 16);

  const table = document.createElement("table");
  table.className = "results-table";
  const thead = table.createTHead();
  const hrow  = thead.insertRow();
  cols.forEach(k => { const th = document.createElement("th"); th.textContent = k; hrow.appendChild(th); });
  const tbody = table.createTBody();
  flat.forEach(doc => {
    const tr = tbody.insertRow();
    cols.forEach(k => { const td = tr.insertCell(); td.appendChild(renderCell(doc[k])); });
  });
  return table;
}

function flattenDoc(obj, prefix = "", depth = 0) {
  if (depth > 3) return { [prefix]: "[…]" };
  const out = {};
  for (const [k, v] of Object.entries(obj || {})) {
    const key = prefix ? `${prefix}.${k}` : k;
    if (v && typeof v === "object" && !Array.isArray(v)) Object.assign(out, flattenDoc(v, key, depth + 1));
    else if (Array.isArray(v)) out[key] = `[${v.length}]`;
    else out[key] = v;
  }
  return out;
}

function renderCell(v) {
  const s = document.createElement("span");
  if (v === null || v === undefined) { s.className = "val-null"; s.textContent = "—"; }
  else if (typeof v === "boolean")   { s.className = v ? "val-bool-true" : "val-bool-false"; s.textContent = String(v); }
  else if (typeof v === "number")    { s.className = "val-number"; s.textContent = v.toLocaleString(); }
  else s.textContent = String(v);
  return s;
}


// ── Utilities ─────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function fmtTime(iso) {
  if (!iso) return "";
  const d     = new Date(iso);
  const today = new Date();
  const time  = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  if (d.toDateString() === today.toDateString()) return time;
  return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " · " + time;
}


// ── Voice input ───────────────────────────────────────────────
voiceBtn.addEventListener("click", () => { isListening ? stopVoice() : startVoice(); });

function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Voice input requires Chrome or Edge."); return; }
  recognition = new SR();
  recognition.continuous = false; recognition.interimResults = true; recognition.lang = "en-US";
  let lastTranscript = "";
  recognition.onstart = () => {
    isListening = true;
    voiceBtn.classList.add("active");
    listeningHint.style.display = "inline";
    inputWrap.classList.add("listening");
  };
  recognition.onresult = e => {
    lastTranscript = Array.from(e.results).map(r => r[0].transcript).join("");
    questionInput.value = lastTranscript;
    questionInput.dispatchEvent(new Event("input"));
  };
  recognition.onend   = () => { stopVoiceUI(); if (lastTranscript.trim()) submitQuery(); };
  recognition.onerror = e => { stopVoiceUI(); };
  recognition.start();
}

function stopVoice()   { recognition?.stop(); stopVoiceUI(); }
function stopVoiceUI() {
  isListening = false;
  voiceBtn.classList.remove("active");
  listeningHint.style.display = "none";
  inputWrap.classList.remove("listening");
}


// ── Init ──────────────────────────────────────────────────────
renderSidebar();
questionInput.focus();
</script>
</body>
</html>
